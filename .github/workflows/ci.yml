name: CI — SGIAC-ISC

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ─── Job 1: Build ───────────────────────────────────
  build:
    name: Build Docker
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Crear backend/.env con Secrets
        run: |
          cat <<EOF > ./backend/.env
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}
          EOF

      - name: Build de contenedores
        run: docker compose build

  # ─── Job 2: Health check ────────────────────────────
  health:
    name: Health Check
    runs-on: ubuntu-latest
    needs: build  # solo corre si build pasó

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Crear backend/.env con Secrets
        run: |
          cat <<EOF > ./backend/.env
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}
          EOF

      - name: Levantar servicios
        run: docker compose up -d

      - name: Esperar backend (retry con timeout)
        run: |
          echo "Esperando backend en :3000..."
          for i in {1..20}; do
            curl -sf http://localhost:3000/health && echo "✅ Backend OK" && exit 0
            echo "Intento $i/20 — esperando 3s..."
            sleep 3
          done
          echo "❌ Backend no respondió después de 60s"
          docker compose logs backend
          exit 1

      - name: Verificar frontend (Nginx)
        run: |
          curl -sf http://localhost:8080 -o /dev/null && echo "✅ Frontend OK" || echo "⚠️ Frontend no responde"

      - name: Logs en caso de fallo
        if: failure()
        run: docker compose logs

      - name: Apagar servicios
        if: always()
        run: docker compose down