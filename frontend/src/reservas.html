<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SGIAC-ISC | Reservas</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="../responsive.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{display:flex;min-height:100vh;overflow-x:hidden;background:#f1f3f9;color:#374151;}
.sidebar{width:240px;background:#1f2a3a;color:white;transition:0.3s;overflow-y:auto;flex-shrink:0;}
.logo{padding:22px;font-weight:600;font-size:20px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.1);}
.menu a{display:flex;align-items:center;padding:14px 22px;color:#cbd5e1;text-decoration:none;font-size:14px;transition:0.2s;}
.menu a i{margin-right:10px;width:20px;}
.menu a:hover,.menu a.active{background:#4f46e5;color:white;}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.header{height:65px;background:white;display:flex;align-items:center;justify-content:space-between;padding:0 25px;border-bottom:1px solid #e6e8f0;flex-shrink:0;}
.header h2{font-size:18px;color:#1f2a3a;}
.header-left{display:flex;align-items:center;gap:15px;}
.menu-btn{font-size:20px;cursor:pointer;color:#374151;}
.user{display:flex;align-items:center;gap:10px;font-size:14px;}
.user img{width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid #e5e7eb;}
.content{padding:25px;overflow-y:auto;flex:1;}
.panel{background:white;border-radius:10px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.06);margin-bottom:20px;}
.panel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
.panel-header h3{font-size:15px;font-weight:600;color:#1f2a3a;}
.btn{background:#4f46e5;color:white;border:none;padding:9px 16px;border-radius:6px;cursor:pointer;font-size:14px;transition:0.2s;font-family:'Poppins',sans-serif;}
.btn:hover{background:#3730a3;}
.btn-success{background:#10b981;color:white;border:none;padding:7px 12px;border-radius:6px;cursor:pointer;font-size:13px;font-family:'Poppins',sans-serif;transition:0.2s;}
.btn-success:hover{background:#059669;}
.btn-danger{background:#ef4444;color:white;border:none;padding:7px 12px;border-radius:6px;cursor:pointer;font-size:13px;font-family:'Poppins',sans-serif;}
.btn-danger:hover{background:#dc2626;}
.btn-info{background:#0891b2;color:white;border:none;padding:7px 12px;border-radius:6px;cursor:pointer;font-size:13px;font-family:'Poppins',sans-serif;}
.btn-info:hover{background:#0e7490;}

/* Labs grid */
.labs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;}
.lab-status-card{background:#f8f9fc;border-radius:8px;padding:14px;border:1px solid #e5e7eb;transition:0.2s;}
.lab-status-card.occupied{border-color:#fca5a5;background:#fff5f5;}
.lab-status-card.available{border-color:#86efac;background:#f0fdf4;}
.lab-card-title{font-size:13px;font-weight:600;color:#1f2a3a;margin-bottom:2px;}
.lab-card-edif{font-size:11px;color:#6b7280;margin-bottom:6px;}
.lab-status-pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:500;padding:2px 8px;border-radius:12px;}
.pill-available{background:#dcfce7;color:#15803d;}
.pill-occupied{background:#fee2e2;color:#dc2626;}
.pill-dot{width:6px;height:6px;border-radius:50%;background:currentColor;}

/* Filtros */
.filters{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.filters select,.filters input{padding:7px 10px;border-radius:6px;border:1px solid #d1d5db;font-size:13px;font-family:'Poppins',sans-serif;color:#374151;outline:none;}
.filters select:focus,.filters input:focus{border-color:#4f46e5;}

table{width:100%;border-collapse:collapse;font-size:13px;}
th{background:#f8f9fc;font-weight:600;color:#6b7280;padding:10px 12px;text-align:left;font-size:12px;text-transform:uppercase;letter-spacing:0.5px;}
td{padding:10px 12px;border-bottom:1px solid #f3f4f6;color:#374151;vertical-align:top;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#fafafa;}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:500;}
.badge-pending{background:#fef9c3;color:#a16207;}
.badge-approved{background:#dcfce7;color:#15803d;}
.badge-occupied{background:#dbeafe;color:#1d4ed8;}
.badge-released{background:#e0f2fe;color:#0369a1;}
.badge-cancelled{background:#fee2e2;color:#dc2626;}
.empty-state{text-align:center;padding:40px;color:#9ca3af;}
.empty-state i{font-size:36px;margin-bottom:10px;display:block;}

/* Modal */
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);justify-content:center;align-items:flex-start;z-index:1000;padding:20px;overflow-y:auto;}
.modal.open{display:flex;}
.modal-box{background:white;padding:28px;border-radius:12px;width:100%;max-width:520px;position:relative;box-shadow:0 8px 24px rgba(0,0,0,0.15);margin:auto;}
.modal-box h3{font-size:17px;font-weight:600;color:#1f2a3a;margin-bottom:18px;}
.modal-close{position:absolute;top:14px;right:16px;font-size:20px;cursor:pointer;color:#9ca3af;background:none;border:none;}
.form-group{margin-bottom:12px;}
.form-group label{display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:5px;}
.form-group select,.form-group input,.form-group textarea{width:100%;padding:10px;border:1px solid #d1d5db;border-radius:6px;font-size:14px;font-family:'Poppins',sans-serif;outline:none;transition:0.2s;color:#374151;}
.form-group select:focus,.form-group input:focus,.form-group textarea:focus{border-color:#4f46e5;}
.form-group textarea{resize:none;height:64px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.section-sep{font-size:11px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid #f3f4f6;padding-bottom:5px;margin:14px 0 10px;}
.modal-actions{display:flex;gap:10px;margin-top:8px;}
.btn-cancel{flex:1;padding:10px;border:1px solid #d1d5db;border-radius:6px;background:white;color:#374151;font-size:14px;cursor:pointer;font-family:'Poppins',sans-serif;}
.hint{font-size:11px;color:#9ca3af;margin-top:3px;}

/* Consumibles en reserva */
.cons-row{display:grid;grid-template-columns:1fr 80px 28px;gap:8px;align-items:center;margin-bottom:6px;}
.cons-row select,.cons-row input{padding:8px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;font-family:'Poppins',sans-serif;outline:none;}
.btn-remove-c{background:none;border:none;cursor:pointer;color:#ef4444;font-size:15px;}
.btn-add-c{background:none;border:1px dashed #d1d5db;color:#6b7280;padding:6px;border-radius:6px;cursor:pointer;font-size:13px;width:100%;text-align:center;font-family:'Poppins',sans-serif;}
.btn-add-c:hover{background:#f3f4f6;}

/* Sobrante */
.leftover-row{display:grid;grid-template-columns:1fr 90px;gap:8px;align-items:center;background:#f8f9fc;border-radius:6px;padding:8px;margin-bottom:6px;}
.leftover-row .item-name{font-size:13px;color:#374151;}
.leftover-row input{padding:6px 8px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;font-family:'Poppins',sans-serif;outline:none;}

.toast{position:fixed;bottom:25px;right:25px;padding:12px 20px;border-radius:8px;color:white;font-size:14px;z-index:9999;opacity:0;transform:translateY(10px);transition:all 0.3s;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}
.toast.success{background:#10b981;}.toast.error{background:#ef4444;}.toast.info{background:#0891b2;}

@media(max-width:768px){
  .sidebar{position:fixed;top:0;left:0;height:100vh;transform:translateX(-100%);z-index:999;width:260px;}
  .sidebar.open{transform:translateX(0);}
  .form-row{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<div class="sidebar" id="sidebar">
  <img src="public/logoTsj.png" alt="Logo TSJ" style="width:150px;height:90px;margin:0 auto;display:block;">
  <div class="logo">SGIAC-ISC</div>
  <div class="menu">
    <a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
    <a href="activos.html"><i class="fas fa-box"></i> Activos</a>
    <a href="consumibles.html"><i class="fas fa-flask"></i> Consumibles</a>
    <a href="solicitudes.html"><i class="fas fa-clipboard-list"></i> Solicitudes</a>
    <a href="reservas.html" class="active"><i class="fas fa-calendar-check"></i> Reservas</a>
    <a href="usuarios.html"><i class="fas fa-users"></i> Usuarios</a>
    <a href="reportes.html"><i class="fas fa-file-alt"></i> Reportes</a>
    <a href="configuracion.html"><i class="fas fa-cog"></i> Configuración</a>
  </div>
</div>

<div class="main">
  <div class="header">
    <div class="header-left">
      <div class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
      <h2><i class="fas fa-calendar-check"></i> Reservas</h2>
    </div>
    <div class="user">
      <img id="userAvatar" src="https://i.pravatar.cc/40" alt="Avatar">
      <span id="username">Cargando...</span>
    </div>
  </div>

  <div class="content">

    <!-- Estado de laboratorios -->
    <div class="panel">
      <div class="panel-header">
        <h3><i class="fas fa-flask" style="color:#4f46e5;margin-right:6px;"></i> Laboratorios</h3>
        <button class="btn docente-plus" onclick="openNewModal()"><i class="fas fa-plus"></i> Nueva Reserva</button>
      </div>
      <div class="labs-grid" id="labsGrid">
        <div class="empty-state"><i class="fas fa-spinner fa-spin"></i></div>
      </div>
    </div>

    <!-- Tabla de reservas -->
    <div class="panel">
      <div class="panel-header">
        <h3>Reservas Registradas</h3>
      </div>
      <div class="filters">
        <select id="filterStatus" onchange="applyFilters()">
          <option value="">Todos los estados</option>
          <option value="pending">Pendiente</option>
          <option value="approved">Aprobado</option>
          <option value="occupied">En uso</option>
          <option value="released">Liberado</option>
          <option value="cancelled">Cancelado</option>
        </select>
        <input type="date" id="filterFecha" onchange="applyFilters()" placeholder="Filtrar fecha">
      </div>
      <div id="tableWrapper">
        <div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>Cargando...</p></div>
      </div>
    </div>
  </div>
</div>

<!-- ══ MODAL NUEVA RESERVA ══ -->
<div class="modal" id="newModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('newModal')">&times;</button>
    <h3>Nueva Reserva</h3>

    <div class="form-group" id="grpAlumno" style="display:none;">
      <label>Alumno solicitante *</label>
      <select id="newAlumno"></select>
    </div>
    <div class="form-group">
      <label>Laboratorio *</label>
      <select id="newLab" onchange="onLabChange()"></select>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Fecha de uso *</label>
        <input type="date" id="newFecha" onchange="validateWeekend(this)">
        <div class="hint">Solo lunes a viernes</div>
      </div>
      <div class="form-group">
        <label>Hora inicio *</label>
        <input type="time" id="newHoraInicio" step="1800">
      </div>
    </div>
    <div class="form-group">
      <label>Hora fin *</label>
      <input type="time" id="newHoraFin" step="1800">
    </div>
    <div class="form-group">
      <label>Propósito *</label>
      <textarea id="newProposito" placeholder="Descripción de la práctica o actividad..."></textarea>
    </div>

    <div class="section-sep">Consumibles (opcional)</div>
    <div id="consContainer"></div>
    <button class="btn-add-c" onclick="addConsRow()"><i class="fas fa-plus"></i> Agregar consumible</button>

    <div class="modal-actions" style="margin-top:14px;">
      <button class="btn-cancel" onclick="closeModal('newModal')">Cancelar</button>
      <button class="btn" style="flex:1;" onclick="saveReservation()"><i class="fas fa-save"></i> Guardar</button>
    </div>
  </div>
</div>

<!-- ══ MODAL APROBAR ══ -->
<div class="modal" id="approveModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('approveModal')">&times;</button>
    <h3>Aprobar Reserva</h3>
    <input type="hidden" id="approveId">
    <div class="form-row">
      <div class="form-group">
        <label>Grupo *</label>
        <input type="text" id="approveGrupo" placeholder="Ej. ISC-3A">
      </div>
      <div class="form-group">
        <label>Semestre *</label>
        <input type="text" id="approveSemestre" placeholder="Ej. 2025-A">
      </div>
    </div>
    <div class="form-group">
      <label>Encargado del grupo</label>
      <input type="text" id="approveEncargado" placeholder="Nombre del encargado">
    </div>
    <div class="form-group">
      <label>Mensaje al alumno</label>
      <textarea id="approveMessage" placeholder="Indicaciones adicionales..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('approveModal')">Cancelar</button>
      <button class="btn" style="flex:1;background:#16a34a;" onclick="approveReservation()"><i class="fas fa-check"></i> Aprobar</button>
    </div>
  </div>
</div>

<!-- ══ MODAL LIBERAR (firma salida + sobrantes) ══ -->
<div class="modal" id="releaseModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('releaseModal')">&times;</button>
    <h3>Firma de Salida</h3>
    <input type="hidden" id="releaseId">
    <div id="leftoverSection" style="display:none;">
      <div class="section-sep">Material sobrante</div>
      <div id="leftoverList"></div>
    </div>
    <div class="modal-actions" style="margin-top:12px;">
      <button class="btn-cancel" onclick="closeModal('releaseModal')">Cancelar</button>
      <button class="btn" style="flex:1;" onclick="releaseReservation()"><i class="fas fa-sign-out-alt"></i> Confirmar salida</button>
    </div>
  </div>
</div>

<!-- ══ MODAL CANCELAR ══ -->
<div class="modal" id="cancelModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal('cancelModal')">&times;</button>
    <h3>Cancelar Reserva</h3>
    <input type="hidden" id="cancelId">
    <div class="form-group">
      <label>Motivo de cancelación</label>
      <textarea id="cancelMessage" placeholder="Razón de la cancelación..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('cancelModal')">Cancelar</button>
      <button class="btn" style="flex:1;background:#dc2626;" onclick="cancelReservation()"><i class="fas fa-times"></i> Confirmar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API      = "/api/reservations";
let allReservations = [];
let labs        = [];
let consumables = [];
let users       = [];
let currentUser = null;
let consRowCount = 0;

document.addEventListener("DOMContentLoaded", async () => {
  await loadCatalogs();
  renderLabsGrid();
  await loadReservations();
});

async function loadCatalogs() {
  const [labsRes, consRes, usersRes] = await Promise.all([
    fetch("/api/labs").then(r => r.json()),
    fetch("/api/consumibles").then(r => r.json()),
    fetch("/api/users").then(r => r.json())
  ]);
  labs        = Array.isArray(labsRes)  ? labsRes  : [];
  consumables = Array.isArray(consRes)  ? consRes  : [];
  users       = Array.isArray(usersRes) ? usersRes : [];
}

// ── LABS GRID (estado ocupado/disponible) ──
function renderLabsGrid() {
  const occupied = new Set(
    allReservations
      .filter(r => r.status === "occupied" || (r.status === "approved" && r.fecha_uso === today()))
      .map(r => r.lab_id)
  );
  const grid = document.getElementById("labsGrid");
  if (!labs.length) { grid.innerHTML = `<p style="color:#9ca3af;font-size:13px;">Sin laboratorios registrados</p>`; return; }
  grid.innerHTML = labs.map(l => {
    const isOcc = occupied.has(l.id);
    return `<div class="lab-status-card ${isOcc ? "occupied" : "available"}">
      <div class="lab-card-title">${l.nombre}</div>
      <div class="lab-card-edif">${l.edificio}</div>
      <div class="lab-status-pill ${isOcc ? "pill-occupied" : "pill-available"}">
        <span class="pill-dot"></span>${isOcc ? "Ocupado" : "Disponible"}
      </div>
      <div style="font-size:11px;color:#9ca3af;margin-top:4px;">${l.open_time}–${l.close_time}</div>
    </div>`;
  }).join("");
}

function today() { return new Date().toISOString().split("T")[0]; }

// ── CARGAR RESERVAS ──
async function loadReservations() {
  const res = await fetch(API);
  allReservations = await res.json();
  renderLabsGrid();
  applyFilters();
}

function applyFilters() {
  const st    = document.getElementById("filterStatus").value;
  const fecha = document.getElementById("filterFecha").value;
  let data = [...allReservations];
  if (st)    data = data.filter(r => r.status === st);
  if (fecha) data = data.filter(r => r.fecha_uso === fecha);
  renderTable(data);
}

// ── TABLA ──
function renderTable(data) {
  const wrap = document.getElementById("tableWrapper");
  const role = currentUser?.role;

  if (!data.length) {
    wrap.innerHTML = `<div class="empty-state"><i class="fas fa-calendar"></i><p>Sin reservas</p></div>`;
    return;
  }

  const statusMap = {
    pending:   '<span class="badge badge-pending">Pendiente</span>',
    approved:  '<span class="badge badge-approved">Aprobado</span>',
    occupied:  '<span class="badge badge-occupied">En uso</span>',
    released:  '<span class="badge badge-released">Liberado</span>',
    cancelled: '<span class="badge badge-cancelled">Cancelado</span>'
  };

  const rows = data.map(r => {
    const labName  = r.lab ? `${r.lab.nombre}<br><small style="color:#6b7280;">${r.lab.edificio}</small>` : "—";
    const consText = r.reservation_consumables?.length
      ? r.reservation_consumables.map(c => `${c.consumables?.name} ×${c.quantity_requested}`).join(", ")
      : "—";

    let acciones = "";
    if (role === "docente" && r.status === "pending") {
      acciones += `<button class="btn-success" onclick="openApprove(${r.id})" title="Aprobar"><i class="fas fa-check"></i></button>`;
    }
    if ((role === "docente" || role === "administrador") && r.status === "approved") {
      acciones += `<button class="btn-info" onclick="markOccupied(${r.id})" title="Marcar en uso"><i class="fas fa-play"></i></button>`;
    }
    if ((role === "docente" || role === "administrador") && r.status === "occupied") {
      acciones += `<button class="btn-success" onclick="openRelease(${r.id})" title="Firma de salida"><i class="fas fa-sign-out-alt"></i></button>`;
    }
    if ((role === "docente" && (r.status === "pending" || r.status === "approved") && r.docente_id === currentUser?.id)
      || role === "administrador") {
      acciones += `<button class="btn-danger" onclick="openCancel(${r.id})" title="Cancelar"><i class="fas fa-times"></i></button>`;
    }
    if (role === "administrador") {
      acciones += `<button style="background:#6b7280;color:white;border:none;padding:7px 12px;border-radius:6px;cursor:pointer;font-size:13px;" onclick="deleteReservation(${r.id})"><i class="fas fa-trash"></i></button>`;
    }

    return `<tr>
      <td>${labName}</td>
      <td>${r.docente?.username || "—"}<br><small style="color:#6b7280;">${r.grupo ? r.grupo + " · " + r.semestre : ""}</small></td>
      <td>${formatDate(r.fecha_uso)}<br><small style="color:#6b7280;">${r.hora_inicio} – ${r.hora_fin}</small></td>
      <td><small style="color:#6b7280;">${consText}</small></td>
      <td>${statusMap[r.status] || r.status}</td>
      <td><div style="display:flex;gap:5px;flex-wrap:wrap;">${acciones}</div></td>
    </tr>`;
  }).join("");

  wrap.innerHTML = `
    <table>
      <thead><tr>
        <th>Laboratorio</th><th>Docente / Grupo</th>
        <th>Fecha y hora</th><th>Consumibles</th>
        <th>Estado</th><th>Acciones</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// ── NUEVA RESERVA ──
function openNewModal() {
  // Llenar labs
  const sel = document.getElementById("newLab");
  sel.innerHTML = `<option value="">-- Selecciona laboratorio --</option>`;
  const grouped = labs.reduce((acc, l) => { (acc[l.edificio] = acc[l.edificio] || []).push(l); return acc; }, {});
  for (const [edif, ls] of Object.entries(grouped)) {
    const og = document.createElement("optgroup"); og.label = edif;
    ls.forEach(l => {
      const op = document.createElement("option"); op.value = l.id;
      op.textContent = l.nombre;
      op.dataset.open  = l.open_time;
      op.dataset.close = l.close_time;
      og.appendChild(op);
    });
    sel.appendChild(og);
  }

  // Fecha mínima = hoy
  const todayStr = today();
  document.getElementById("newFecha").min = todayStr;
  document.getElementById("newFecha").value = "";

  // Limpiar consumibles
  document.getElementById("consContainer").innerHTML = "";
  consRowCount = 0;

  // Alumno (solo si docente/admin)
  const grpAlumno = document.getElementById("grpAlumno");
  if (currentUser?.role !== "alumno") {
    grpAlumno.style.display = "block";
    const alumnos = users.filter(u => u.role === "alumno");
    document.getElementById("newAlumno").innerHTML =
      `<option value="">-- Alumno --</option>` + alumnos.map(a => `<option value="${a.id}">${a.username}</option>`).join("");
  } else {
    grpAlumno.style.display = "none";
  }

  document.getElementById("newModal").classList.add("open");
}

function validateWeekend(input) {
  if (!input.value) return;
  const d = new Date(input.value + "T12:00:00");
  if (d.getDay() === 0 || d.getDay() === 6) {
    showToast("No se permiten reservas en fines de semana", "error");
    input.value = "";
  }
}

function onLabChange() {
  const opt = document.getElementById("newLab").selectedOptions[0];
  if (!opt?.dataset.open) return;
  document.getElementById("newHoraInicio").min = opt.dataset.open;
  document.getElementById("newHoraInicio").max = opt.dataset.close;
  document.getElementById("newHoraFin").min    = opt.dataset.open;
  document.getElementById("newHoraFin").max    = opt.dataset.close;
}

function addConsRow() {
  const id  = `cons_${++consRowCount}`;
  const row = document.createElement("div");
  row.className = "cons-row"; row.id = id;
  row.innerHTML = `
    <select>
      <option value="">-- Consumible --</option>
      ${consumables.map(c => `<option value="${c.id}">${c.name} (${c.quantity} ${c.unit})</option>`).join("")}
    </select>
    <input type="number" value="1" min="1" placeholder="Cant.">
    <button class="btn-remove-c" onclick="document.getElementById('${id}').remove()"><i class="fas fa-times"></i></button>`;
  document.getElementById("consContainer").appendChild(row);
}

async function saveReservation() {
  const lab_id       = document.getElementById("newLab").value;
  const fecha_uso    = document.getElementById("newFecha").value;
  const hora_inicio  = document.getElementById("newHoraInicio").value;
  const hora_fin     = document.getElementById("newHoraFin").value;
  const proposito    = document.getElementById("newProposito").value.trim();

  if (!lab_id || !fecha_uso || !hora_inicio || !hora_fin || !proposito) {
    showToast("Completa todos los campos obligatorios", "error"); return;
  }

  let alumno_id = currentUser?.id;
  if (currentUser?.role !== "alumno") {
    alumno_id = parseInt(document.getElementById("newAlumno").value);
    if (!alumno_id) { showToast("Selecciona un alumno", "error"); return; }
  }

  // Consumibles
  const consumablesArr = [];
  document.querySelectorAll("#consContainer .cons-row").forEach(row => {
    const cid = row.querySelector("select").value;
    const qty = parseInt(row.querySelector("input").value) || 1;
    if (cid) consumablesArr.push({ consumable_id: parseInt(cid), quantity_requested: qty });
  });

  const body = {
    alumno_id,
    docente_id: currentUser?.role === "docente" ? currentUser.id : null,
    lab_id: parseInt(lab_id),
    fecha_uso, hora_inicio, hora_fin, proposito,
    consumables: consumablesArr
  };

  const res = await fetch(API, {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });
  if (!res.ok) { const e = await res.json(); showToast(e.message || "Error", "error"); return; }
  showToast("Reserva creada exitosamente ✅", "success");
  closeModal("newModal");
  loadReservations();
}

// ── APROBAR ──
function openApprove(id) {
  document.getElementById("approveId").value = id;
  ["approveGrupo","approveSemestre","approveEncargado","approveMessage"].forEach(f => document.getElementById(f).value = "");
  document.getElementById("approveModal").classList.add("open");
}
async function approveReservation() {
  const id       = document.getElementById("approveId").value;
  const grupo    = document.getElementById("approveGrupo").value.trim();
  const semestre = document.getElementById("approveSemestre").value.trim();
  const encarg   = document.getElementById("approveEncargado").value.trim();
  const msg      = document.getElementById("approveMessage").value.trim();
  if (!grupo || !semestre) { showToast("Grupo y semestre son obligatorios", "error"); return; }
  const res = await fetch(`${API}/${id}/approve`, {
    method: "PUT", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ grupo, semestre, encargado_grupo: encarg, docente_message: msg })
  });
  if (!res.ok) { showToast("Error al aprobar", "error"); return; }
  showToast("Reserva aprobada ✅", "success");
  closeModal("approveModal");
  loadReservations();
}

// ── EN USO ──
async function markOccupied(id) {
  if (!confirm("¿Marcar laboratorio como 'En uso'?")) return;
  await fetch(`${API}/${id}/occupy`, { method: "PUT" });
  showToast("Laboratorio marcado como en uso", "info");
  loadReservations();
}

// ── LIBERAR ──
function openRelease(id) {
  const r = allReservations.find(x => x.id === id);
  document.getElementById("releaseId").value = id;
  const listEl  = document.getElementById("leftoverList");
  const section = document.getElementById("leftoverSection");
  listEl.innerHTML = "";

  const cons = r?.reservation_consumables || [];
  if (cons.length > 0) {
    section.style.display = "block";
    cons.forEach(c => {
      listEl.innerHTML += `
        <div class="leftover-row" data-rc-id="${c.id}">
          <span class="item-name">${c.consumables?.name || "Consumible"} (solicitado: ${c.quantity_requested})</span>
          <input type="number" min="0" placeholder="Sobrante" value="0">
        </div>`;
    });
  } else {
    section.style.display = "none";
  }
  document.getElementById("releaseModal").classList.add("open");
}
async function releaseReservation() {
  const id = document.getElementById("releaseId").value;
  const leftover_items = [];
  document.querySelectorAll("#leftoverList .leftover-row").forEach(row => {
    leftover_items.push({ reservation_consumable_id: parseInt(row.dataset.rcId), leftover_qty: parseInt(row.querySelector("input").value) || 0 });
  });
  const res = await fetch(`${API}/${id}/release`, {
    method: "PUT", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ leftover_items })
  });
  if (!res.ok) { showToast("Error al liberar", "error"); return; }
  showToast("Laboratorio liberado ✅", "success");
  closeModal("releaseModal");
  loadReservations();
}

// ── CANCELAR ──
function openCancel(id) {
  document.getElementById("cancelId").value = id;
  document.getElementById("cancelMessage").value = "";
  document.getElementById("cancelModal").classList.add("open");
}
async function cancelReservation() {
  const id  = document.getElementById("cancelId").value;
  const msg = document.getElementById("cancelMessage").value.trim();
  await fetch(`${API}/${id}/cancel`, {
    method: "PUT", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ docente_message: msg })
  });
  showToast("Reserva cancelada", "info");
  closeModal("cancelModal");
  loadReservations();
}

// ── ELIMINAR ──
async function deleteReservation(id) {
  if (!confirm("¿Eliminar esta reserva?")) return;
  await fetch(`${API}/${id}`, { method: "DELETE" });
  showToast("Reserva eliminada", "info");
  loadReservations();
}

// ── UTILS ──
function closeModal(id) { document.getElementById(id).classList.remove("open"); }
function toggleMenu() {
  document.getElementById("sidebar").classList.toggle("open");
  document.getElementById("sidebarOverlay").classList.toggle("show");
}
function closeSidebar() {
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("sidebarOverlay").classList.remove("show");
}
function formatDate(d) {
  if (!d) return "—";
  const p = d.split("-"); return p.length === 3 ? `${p[2]}/${p[1]}/${p[0]}` : d;
}
function showToast(msg, type = "success") {
  const t = document.getElementById("toast");
  t.textContent = msg; t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove("show"), 3500);
}
document.querySelectorAll(".modal").forEach(m => {
  m.addEventListener("click", e => { if (e.target === m) m.classList.remove("open"); });
});
</script>
<script src="../js/common.js"></script>
</body>
