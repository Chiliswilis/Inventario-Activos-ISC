<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="public/logoTsj.png">
<title>SGIAC-ISC | Solicitudes</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="../responsive.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{display:flex;min-height:100vh;overflow-x:hidden;background:#f1f3f9;color:#374151;}
.sidebar{width:240px;background:#1f2a3a;color:white;transition:0.3s;flex-shrink:0;}
.logo{padding:22px;font-weight:600;font-size:20px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.1);}
.menu a{display:flex;align-items:center;padding:14px 22px;color:#cbd5e1;text-decoration:none;font-size:14px;transition:0.2s;}
.menu a i{margin-right:10px;width:20px;}
.menu a:hover,.menu a.active{background:#4f46e5;color:white;}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.header{height:65px;background:white;display:flex;align-items:center;justify-content:space-between;padding:0 25px;border-bottom:1px solid #e6e8f0;flex-shrink:0;}
.header h2{font-size:18px;color:#1f2a3a;}
.header-left{display:flex;align-items:center;gap:15px;}
.menu-btn{font-size:20px;cursor:pointer;color:#374151;}
.user{display:flex;align-items:center;gap:10px;font-size:14px;}
.user img{width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid #e5e7eb;}
.content{padding:25px;overflow-y:auto;flex:1;}
.panel{background:white;border-radius:10px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
.panel-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.panel-header h3{font-size:15px;font-weight:600;color:#1f2a3a;}
.btn{background:#4f46e5;color:white;border:none;padding:9px 16px;border-radius:6px;cursor:pointer;font-size:14px;transition:0.2s;font-family:'Poppins',sans-serif;}
.btn:hover{background:#3730a3;}
.btn-export{background:#10b981;color:white;border:none;padding:9px 14px;border-radius:6px;cursor:pointer;font-size:13px;font-family:'Poppins',sans-serif;}
.btn-export:hover{background:#059669;}
.toolbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
.toolbar select,.toolbar input{padding:7px 10px;border-radius:6px;border:1px solid #d1d5db;font-size:13px;font-family:'Poppins',sans-serif;color:#374151;outline:none;}
.toolbar select:focus,.toolbar input:focus{border-color:#4f46e5;}
.search-box{display:flex;align-items:center;gap:6px;background:#f8f9fc;border:1px solid #d1d5db;border-radius:6px;padding:6px 10px;}
.search-box i{color:#9ca3af;font-size:13px;}
.search-box input{border:none;background:none;outline:none;font-size:13px;font-family:'Poppins',sans-serif;color:#374151;width:160px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{background:#f8f9fc;font-weight:600;color:#6b7280;padding:10px 12px;text-align:left;font-size:12px;text-transform:uppercase;letter-spacing:0.5px;}
td{padding:10px 12px;border-bottom:1px solid #f3f4f6;color:#374151;vertical-align:top;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#fafafa;}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:500;}
.badge-pending{background:#fef9c3;color:#a16207;}
.badge-info{background:#dbeafe;color:#1d4ed8;}
.badge-approved{background:#dcfce7;color:#15803d;}
.badge-rejected{background:#fee2e2;color:#dc2626;}
.badge-returned{background:#e0f2fe;color:#0369a1;}
.action-btn{background:none;border:none;cursor:pointer;padding:5px 7px;border-radius:5px;font-size:14px;transition:0.2s;}
.action-approve{color:#16a34a;}.action-approve:hover{background:#dcfce7;}
.action-reject{color:#dc2626;}.action-reject:hover{background:#fee2e2;}
.action-return{color:#4f46e5;}.action-return:hover{background:#ede9fe;}
.action-delete{color:#6b7280;}.action-delete:hover{background:#f3f4f6;}
.action-info{color:#0891b2;}.action-info:hover{background:#e0f2fe;}
.action-send{color:#d97706;}.action-send:hover{background:#fef3c7;}
.empty-state{text-align:center;padding:40px;color:#9ca3af;}
.empty-state i{font-size:36px;margin-bottom:10px;display:block;}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);justify-content:center;align-items:flex-start;z-index:1000;padding:20px;overflow-y:auto;}
.modal.open{display:flex;}
.modal-box{background:white;padding:28px;border-radius:12px;width:100%;max-width:560px;position:relative;box-shadow:0 8px 24px rgba(0,0,0,0.15);margin:auto;}
.modal-box h3{font-size:17px;font-weight:600;color:#1f2a3a;margin-bottom:18px;}
.modal-close{position:absolute;top:14px;right:16px;font-size:20px;cursor:pointer;color:#9ca3af;background:none;border:none;}
.form-group{margin-bottom:12px;}
.form-group label{display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:5px;}
.form-group select,.form-group input,.form-group textarea{width:100%;padding:10px;border:1px solid #d1d5db;border-radius:6px;font-size:14px;font-family:'Poppins',sans-serif;outline:none;transition:0.2s;color:#374151;}
.form-group select:focus,.form-group input:focus,.form-group textarea:focus{border-color:#4f46e5;}
.form-group textarea{resize:none;height:64px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.modal-actions{display:flex;gap:10px;margin-top:10px;}
.btn-cancel{flex:1;padding:10px;border:1px solid #d1d5db;border-radius:6px;background:white;color:#374151;font-size:14px;cursor:pointer;font-family:'Poppins',sans-serif;}
.section-sep{font-size:11px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid #f3f4f6;padding-bottom:5px;margin:14px 0 10px;}
.items-wrap{border:1px solid #e5e7eb;border-radius:8px;padding:10px;margin-bottom:8px;max-height:240px;overflow-y:auto;}
.item-row{display:grid;gap:8px;align-items:center;margin-bottom:6px;}
.item-row-asset{grid-template-columns:1fr 28px;}
.item-row-cons{grid-template-columns:1fr 70px 28px;}
.item-row select,.item-row input{padding:8px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;font-family:'Poppins',sans-serif;outline:none;width:100%;}
.btn-remove-item{background:none;border:none;cursor:pointer;color:#ef4444;font-size:15px;padding:2px 4px;}
.btn-add-row{background:none;border:1px dashed #d1d5db;color:#6b7280;padding:7px;border-radius:6px;cursor:pointer;font-size:13px;width:100%;text-align:center;font-family:'Poppins',sans-serif;transition:0.2s;}
.btn-add-row:hover{background:#f3f4f6;border-color:#9ca3af;}
.add-btns{display:flex;gap:8px;}
.add-btns button{flex:1;}
.lab-section{background:#f8f9fc;border-radius:8px;padding:14px;margin-bottom:12px;}
.hint{font-size:11px;color:#9ca3af;margin-top:3px;}
.toast{position:fixed;bottom:25px;right:25px;padding:12px 20px;border-radius:8px;color:white;font-size:14px;z-index:9999;opacity:0;transform:translateY(10px);transition:all 0.3s;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}
.toast.success{background:#10b981;}.toast.error{background:#ef4444;}.toast.info{background:#0891b2;}
@media(max-width:768px){
  .sidebar{position:fixed!important;top:0;left:0;height:100vh!important;transform:translateX(-100%);z-index:999;width:260px!important;}
  .sidebar.open{transform:translateX(0);}
  .form-row{grid-template-columns:1fr;}
  .search-box input{width:100px;}
}
</style>
</head>
<body>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
<div class="sidebar" id="sidebar">
  <img src="public/logoTsj.png" alt="Logo TSJ" style="width:150px;height:90px;margin:0 auto;display:block;">
  <div class="logo">SGIAC-ISC</div>
  <div class="menu">
    <a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
    <a href="activos.html"><i class="fas fa-box"></i> Activos</a>
    <a href="consumibles.html"><i class="fas fa-flask"></i> Consumibles</a>
    <a href="solicitudes.html" class="active"><i class="fas fa-clipboard-list"></i> Solicitudes</a>
    <a href="reservas.html"><i class="fas fa-calendar-check"></i> Reservas</a>
    <a href="usuarios.html"><i class="fas fa-users"></i> Usuarios</a>
    <a href="reportes.html"><i class="fas fa-file-alt"></i> Reportes</a>
    <a href="configuracion.html"><i class="fas fa-cog"></i> Configuración</a>
  </div>
</div>

<div class="main">
  <div class="header">
    <div class="header-left">
      <div class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
      <h2><i class="fas fa-clipboard-list"></i> Solicitudes</h2>
    </div>
    <div class="user">
      <img id="userAvatar" src="https://i.pravatar.cc/40" alt="Avatar">
      <span id="username">Cargando...</span>
    </div>
  </div>

  <div class="content">
    <div class="panel">
      <div class="panel-header">
        <h3>Gestión de Solicitudes</h3>
        <div style="display:flex;gap:8px;">
          <button class="btn-export admin-only" onclick="exportCSV()"><i class="fas fa-file-csv"></i> Exportar</button>
          <button class="btn" onclick="openModal()"><i class="fas fa-plus"></i> Nueva Solicitud</button>
        </div>
      </div>

      <div class="toolbar">
        <select id="filterStatus" onchange="applyFilters()">
          <option value="">Todos los estados</option>
          <option value="pending">Pendiente (docente)</option>
          <option value="pending_admin">Pendiente (admin)</option>
          <option value="approved">Aprobada</option>
          <option value="rejected">Rechazada</option>
          <option value="returned">Devuelta</option>
        </select>
        <select id="filterType" onchange="applyFilters()">
          <option value="">Todos los tipos</option>
          <option value="asset">Activo</option>
          <option value="consumable">Consumible</option>
          <option value="laboratorio">Laboratorio</option>
        </select>
        <div class="search-box" id="searchBox">
          <i class="fas fa-search"></i>
          <input type="text" id="searchAlumno" placeholder="Buscar usuario..." oninput="applyFilters()">
        </div>
      </div>

      <div id="tableWrapper">
        <div class="empty-state"><i class="fas fa-spinner fa-spin"></i><p>Cargando...</p></div>
      </div>
    </div>
  </div>
</div>

<!-- ══ MODAL NUEVA SOLICITUD ══ -->
<div class="modal" id="requestModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <h3>Nueva Solicitud</h3>

    <div class="form-group">
      <label>Solicitante *</label>
      <select id="reqUser"></select>
    </div>
    <div class="form-group" id="docenteGroup" style="display:none;">
      <label>Docente encargado *</label>
      <select id="reqDocente"></select>
    </div>
    <div class="form-group">
      <label>Tipo de ítem</label>
      <select id="reqType" onchange="onTypeChange()">
        <option value="asset">Activo</option>
        <option value="consumable">Consumible</option>
        <option value="laboratorio">Laboratorio</option>
      </select>
    </div>
    <div class="form-group">
      <label>Propósito / descripción de uso *</label>
      <textarea id="reqPurpose" placeholder="¿Para qué se necesita este material o laboratorio?"></textarea>
    </div>

    <!-- Ítems activo -->
    <div id="itemsSection">
      <div class="section-sep">Ítems solicitados</div>
      <div class="items-wrap" id="itemsContainer"></div>
      <button class="btn-add-row" onclick="addItemRow()"><i class="fas fa-plus"></i> Agregar ítem</button>
    </div>

    <!-- Laboratorio -->
    <div id="labSection" style="display:none;">
      <div class="section-sep">Laboratorio</div>
      <div class="lab-section">
        <div class="form-group" style="margin-bottom:10px;">
          <label>Laboratorio *</label>
          <select id="reqLab"></select>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Fecha de uso *</label>
            <input type="date" id="reqFecha" onchange="validateWeekend(this)">
            <div class="hint"><i class="fas fa-info-circle"></i> Solo lunes a viernes · 8:00–15:00</div>
          </div>
          <div class="form-group">
            <label>Hora inicio *</label>
            <input type="time" id="reqHoraInicio" min="08:00" max="15:00" step="1800">
          </div>
        </div>
        <div class="form-group">
          <label>Hora fin *</label>
          <input type="time" id="reqHoraFin" min="08:00" max="15:00" step="1800">
        </div>
      </div>

      <div class="section-sep">Material para la práctica <span style="font-weight:400;font-size:11px;color:#9ca3af;">(opcional)</span></div>
      <div class="items-wrap" id="labItemsContainer"></div>
      <div class="add-btns">
        <button class="btn-add-row" onclick="addLabItemRow('asset')"><i class="fas fa-plus"></i> Activo</button>
        <button class="btn-add-row" onclick="addLabItemRow('consumable')"><i class="fas fa-plus"></i> Consumible</button>
      </div>
    </div>

    <div class="form-group" style="margin-top:12px;">
      <label>Notas adicionales</label>
      <textarea id="reqNotes" placeholder="Observaciones opcionales..."></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn" style="flex:1;" onclick="saveRequest()"><i class="fas fa-save"></i> Guardar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Catálogos globales ──
let _allAssets      = [];   // activos disponibles cargados del servidor
let _allConsumables = [];   // consumibles cargados del servidor
let _itemRowCount   = 0;
let _labItemRowCount = 0;

// Cargar catálogos al abrir el modal
async function loadItemCatalogs() {
  if (_allAssets.length && _allConsumables.length) return; // ya cargados
  const [ar, cr] = await Promise.all([
    fetch("/api/assets").then(r => r.json()),
    fetch("/api/consumibles").then(r => r.json())
  ]);
  _allAssets      = Array.isArray(ar) ? ar.filter(a => a.status === "available") : [];
  _allConsumables = Array.isArray(cr) ? cr : [];
}

// ── IDs ya seleccionados en un contenedor ──
function _getSelectedAssetIds(containerId) {
  const ids = new Set();
  document.querySelectorAll(`#${containerId} .item-row select[data-kind="asset"]`).forEach(sel => {
    if (sel.value) ids.add(parseInt(sel.value));
  });
  return ids;
}
function _getSelectedConsIds(containerId) {
  const ids = new Set();
  document.querySelectorAll(`#${containerId} .item-row select[data-kind="consumable"]`).forEach(sel => {
    if (sel.value) ids.add(parseInt(sel.value));
  });
  return ids;
}

// ── Actualizar opciones de TODAS las filas de activos en un contenedor ──
function refreshAssetOptions(containerId) {
  const selected = _getSelectedAssetIds(containerId);
  document.querySelectorAll(`#${containerId} .item-row select[data-kind="asset"]`).forEach(sel => {
    const cur = sel.value ? parseInt(sel.value) : null;
    const available = _allAssets.filter(a => !selected.has(a.id) || a.id === cur);
    sel.innerHTML = `<option value="">-- Activo --</option>` +
      available.map(a =>
        `<option value="${a.id}" ${a.id === cur ? "selected" : ""}>${a.name} — ${a.serial_number}</option>`
      ).join("");
  });
}

// ── Actualizar opciones de TODAS las filas de consumibles en un contenedor ──
function refreshConsOptions(containerId) {
  const selected = _getSelectedConsIds(containerId);
  document.querySelectorAll(`#${containerId} .item-row select[data-kind="consumable"]`).forEach(sel => {
    const cur = sel.value ? parseInt(sel.value) : null;
    const available = _allConsumables.filter(c => !selected.has(c.id) || c.id === cur);
    sel.innerHTML = `<option value="">-- Consumible --</option>` +
      available.map(c =>
        `<option value="${c.id}" ${c.id === cur ? "selected" : ""}>${c.name} (${c.quantity} ${c.unit})</option>`
      ).join("");
  });
}

// ── Agregar fila en sección de activo/consumible simple ──
function addItemRow() {
  const type = document.getElementById("reqType").value; // "asset" o "consumable"
  const cid  = `item_${++_itemRowCount}`;
  const row  = document.createElement("div");

  if (type === "asset") {
    const selected  = _getSelectedAssetIds("itemsContainer");
    const available = _allAssets.filter(a => !selected.has(a.id));
    row.className   = "item-row item-row-asset"; row.id = cid;
    row.innerHTML = `
      <select data-kind="asset" onchange="refreshAssetOptions('itemsContainer')">
        <option value="">-- Activo --</option>
        ${available.map(a => `<option value="${a.id}">${a.name} — ${a.serial_number}</option>`).join("")}
      </select>
      <button class="btn-remove-item" onclick="document.getElementById('${cid}').remove(); refreshAssetOptions('itemsContainer')">
        <i class="fas fa-times"></i>
      </button>`;
  } else {
    const selected  = _getSelectedConsIds("itemsContainer");
    const available = _allConsumables.filter(c => !selected.has(c.id));
    row.className   = "item-row item-row-cons"; row.id = cid;
    row.innerHTML = `
      <select data-kind="consumable" onchange="refreshConsOptions('itemsContainer')">
        <option value="">-- Consumible --</option>
        ${available.map(c => `<option value="${c.id}">${c.name} (${c.quantity} ${c.unit})</option>`).join("")}
      </select>
      <input type="number" value="1" min="1" placeholder="Cant." style="width:70px;">
      <button class="btn-remove-item" onclick="document.getElementById('${cid}').remove(); refreshConsOptions('itemsContainer')">
        <i class="fas fa-times"></i>
      </button>`;
  }
  document.getElementById("itemsContainer").appendChild(row);
}

// ── Agregar fila en sección de laboratorio ──
function addLabItemRow(type) {
  const cid = `labitem_${++_labItemRowCount}`;
  const row = document.createElement("div");

  if (type === "asset") {
    const selected  = _getSelectedAssetIds("labItemsContainer");
    const available = _allAssets.filter(a => !selected.has(a.id));
    row.className   = "item-row item-row-asset"; row.id = cid;
    row.innerHTML = `
      <select data-kind="asset" onchange="refreshAssetOptions('labItemsContainer')">
        <option value="">-- Activo --</option>
        ${available.map(a => `<option value="${a.id}">${a.name} — ${a.serial_number}</option>`).join("")}
      </select>
      <button class="btn-remove-item" onclick="document.getElementById('${cid}').remove(); refreshAssetOptions('labItemsContainer')">
        <i class="fas fa-times"></i>
      </button>`;
  } else {
    const selected  = _getSelectedConsIds("labItemsContainer");
    const available = _allConsumables.filter(c => !selected.has(c.id));
    row.className   = "item-row item-row-cons"; row.id = cid;
    row.innerHTML = `
      <select data-kind="consumable" onchange="refreshConsOptions('labItemsContainer')">
        <option value="">-- Consumible --</option>
        ${available.map(c => `<option value="${c.id}">${c.name} (${c.quantity} ${c.unit})</option>`).join("")}
      </select>
      <input type="number" value="1" min="1" placeholder="Cant." style="width:70px;">
      <button class="btn-remove-item" onclick="document.getElementById('${cid}').remove(); refreshConsOptions('labItemsContainer')">
        <i class="fas fa-times"></i>
      </button>`;
  }
  document.getElementById("labItemsContainer").appendChild(row);
}

function onTypeChange() {
  const t = document.getElementById("reqType").value;
  document.getElementById("itemsSection").style.display = (t !== "laboratorio") ? "block" : "none";
  document.getElementById("labSection").style.display   = (t === "laboratorio") ? "block" : "none";
  // Limpiar filas al cambiar tipo
  document.getElementById("itemsContainer").innerHTML    = "";
  document.getElementById("labItemsContainer").innerHTML = "";
  _itemRowCount    = 0;
  _labItemRowCount = 0;
}

function validateWeekend(input) {
  if (!input.value) return;
  const d = new Date(input.value + "T12:00:00");
  if (d.getDay() === 0 || d.getDay() === 6) {
    alert("No se permiten solicitudes en fines de semana");
    input.value = "";
  }
}

function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("open");
  document.getElementById("sidebarOverlay").classList.toggle("show");
}
function closeSidebar(){
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("sidebarOverlay").classList.remove("show");
}

// Ocultar buscador para alumnos
document.addEventListener("DOMContentLoaded", () => {
  const user = JSON.parse(localStorage.getItem("user") || "{}");
  if (user.role === "alumno") {
    const sb = document.getElementById("searchBox");
    if (sb) sb.style.display = "none";
  }
});

// ── Interceptar apertura del modal para cargar catálogos ──
async function openModal() {
  await loadItemCatalogs();
  // Limpiar estado anterior
  document.getElementById("itemsContainer").innerHTML    = "";
  document.getElementById("labItemsContainer").innerHTML = "";
  _itemRowCount    = 0;
  _labItemRowCount = 0;
  // Mostrar sección correcta según tipo inicial
  onTypeChange();
  document.getElementById("requestModal").classList.add("open");
}

function closeModal() {
  document.getElementById("requestModal").classList.remove("open");
}
</script>
<script src="../js/solicitudes.js"></script>
<script src="../js/common.js"></script>
</body>
</html>
