<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Configuración - SGIAC-ISC</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{display:flex;min-height:100vh;background:#f1f3f9;}
.sidebar{width:240px;background:#1f2a3a;color:white;transition:0.3s;}
.sidebar.hide{margin-left:-240px;}
.logo{padding:22px;font-weight:600;font-size:18px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.1);}
.menu a{display:block;padding:14px 22px;color:#cbd5e1;text-decoration:none;font-size:14px;}
.menu a:hover{background:#4f46e5;color:white;}
.menu a.active{background:#4f46e5;color:white;}
.menu i{margin-right:10px;width:20px;}
.main{flex:1;display:flex;flex-direction:column;}
.header{height:65px;background:white;display:flex;align-items:center;justify-content:space-between;padding:0 25px;border-bottom:1px solid #e6e8f0;}
.header-left{display:flex;align-items:center;gap:15px;}
.menu-btn{font-size:20px;cursor:pointer;color:#374151;}
.user{display:flex;align-items:center;gap:10px;font-size:14px;}
.user img{width:34px;border-radius:50%;}
.content{padding:25px;}
.settings-section{background:white;padding:20px;margin-bottom:20px;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,0.05);}
.settings-section h2{margin-bottom:15px;}
.settings-form .form-group{margin-bottom:15px;}
.settings-form label{display:block;margin-bottom:5px;font-weight:500;}
.settings-form input{width:100%;padding:8px;border:1px solid #ccc;border-radius:5px;}
.btn-primary{background:#4f46e5;color:white;padding:8px 15px;border:none;border-radius:5px;cursor:pointer;}
.btn-secondary{background:#6b7280;color:white;padding:8px 15px;border:none;border-radius:5px;cursor:pointer;}
</style>
</head>
<body>

<div class="sidebar" id="sidebar">
  <div class="logo">SGIAC-ISC</div>
  <div class="menu">
    <a href="dashboard.html"><i class="fas fa-chart-line"></i> Dashboard</a>
    <a href="activos.html"><i class="fas fa-box"></i> Activos</a>
    <a href="consumibles.html"><i class="fas fa-flask"></i> Consumibles</a>
    <a href="solicitudes.html"><i class="fas fa-clipboard-list"></i> Solicitudes</a>
    <a href="reservas.html"><i class="fas fa-calendar-check"></i> Reservas</a>
    <a href="usuarios.html"><i class="fas fa-users"></i> Usuarios</a>
    <a href="reportes.html"><i class="fas fa-file-alt"></i> Reportes</a>
    <a class="active" href="configuracion.html"><i class="fas fa-cog"></i> Configuración</a>
  </div>
</div>

<div class="main">
  <div class="header">
    <div class="header-left">
      <div class="menu-btn" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
      <h2><i class="fas fa-cog"></i> Configuración</h2>
    </div>
    <div class="user">
      <img src="https://i.pravatar.cc/40">
      <span id="username">Administrador</span>
    </div>
  </div>

  <div class="content">
    <div class="settings-section">
      <h2>Configuración General</h2>
      <form class="settings-form">
        <div class="form-group">
          <label>Nombre del Sistema</label>
          <input type="text" value="SGIAC-ISC">
        </div>
        <div class="form-group">
          <label>Máximo de Reservas</label>
          <input type="number" value="3">
        </div>
        <div class="form-group">
          <label>Email Notificaciones</label>
          <input type="email" value="admin@tecmm.edu.mx">
        </div>
        <button class="btn-primary">Guardar</button>
      </form>
    </div>

    <div class="settings-section">
      <h2>Base de Datos</h2>
      <p>Conexión a Supabase configurada</p>
      <button onclick="testConnection()" class="btn-secondary">Probar conexión</button>
    </div>
  </div>
</div>

<script>
function toggleMenu(){document.getElementById("sidebar").classList.toggle("hide");}
// Aquí puedes cargar dinámicamente el nombre del usuario
document.getElementById("username").innerText = "NombreUsuario"; // reemplaza con dato real
</script>
<script src="../js/configuracion.js"></script>
<script src="../js/common.js"></script>
</body>
</html>
